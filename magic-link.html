<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoadmapX — Signing you in…</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #070711;
      --cyan:   #00f5d4;
      --purple: #7b2fff;
      --text:   #c9d1e0;
      --dim:    #5a6480;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(123,47,255,0.20) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 90% 110%, rgba(0,245,212,0.12) 0%, transparent 60%);
      display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: 100%; max-width: 380px;
      background: rgba(10,10,26,0.92);
      border: 1px solid rgba(123,47,255,0.22);
      border-radius: 16px;
      padding: 48px 36px;
      text-align: center;
      backdrop-filter: blur(24px);
      box-shadow: 0 4px 32px rgba(0,0,0,0.65), 0 0 80px rgba(123,47,255,0.10);
      animation: cardIn 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity:0; transform: translateY(20px) scale(0.97); }
      to   { opacity:1; transform: translateY(0)    scale(1); }
    }

    .logo-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(135deg, rgba(0,245,212,0.14), rgba(123,47,255,0.22));
      border: 1px solid rgba(0,245,212,0.22);
      margin-bottom: 16px;
      box-shadow: 0 0 28px rgba(0,245,212,0.14);
    }
    .logo-icon svg { width: 26px; height: 26px; }

    .app-title {
      font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--cyan) 0%, #a78bfa 55%, var(--purple) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 32px;
    }

    /* ── Spinner ── */
    .spinner-wrap { margin-bottom: 24px; }
    .spinner {
      display: inline-block;
      width: 48px; height: 48px;
      border: 3px solid rgba(0,245,212,0.15);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status icon (success / error) ── */
    .status-icon {
      display: none;
      width: 56px; height: 56px; border-radius: 50%;
      align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 26px;
    }
    .status-icon.success { display: flex; background: rgba(0,245,212,0.12); border: 1px solid rgba(0,245,212,0.3); }
    .status-icon.error   { display: flex; background: rgba(255,45,110,0.10); border: 1px solid rgba(255,45,110,0.3); }

    h2 { font-size: 1.15rem; font-weight: 700; color: #f0f0ff; margin-bottom: 10px; }

    p  { font-size: 0.88rem; color: var(--dim); line-height: 1.6; }
    p.success-txt { color: rgba(0,245,212,0.85); }
    p.error-txt   { color: #ff6b8a; }

    .btn {
      display: inline-block; margin-top: 24px;
      padding: 12px 28px; border-radius: 10px; border: none;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      color: #fff; font-size: 0.93rem; font-weight: 700;
      font-family: inherit; cursor: pointer; text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
    .btn.outline {
      background: none;
      border: 1px solid rgba(123,47,255,0.35);
      color: #a78bfa;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Logo -->
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="url(#lg)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#00f5d4"/>
            <stop offset="100%" stop-color="#7b2fff"/>
          </linearGradient>
        </defs>
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
    </div>
    <div class="app-title">RoadmapX</div>

    <!-- Loading state (default) -->
    <div id="state-loading">
      <div class="spinner-wrap"><div class="spinner"></div></div>
      <h2>Signing you in…</h2>
      <p>Please wait a moment.</p>
    </div>

    <!-- Success state -->
    <div id="state-success" style="display:none">
      <div class="status-icon success">✓</div>
      <h2>You're in! 🎉</h2>
      <p class="success-txt">Redirecting to your roadmap…</p>
    </div>

    <!-- Error state -->
    <div id="state-error" style="display:none">
      <div class="status-icon error">✕</div>
      <h2>Link invalid or expired</h2>
      <p class="error-txt" id="err-msg">This magic link has expired or already been used.</p>
      <a href="login.html" class="btn outline" style="margin-top:20px">← Try again</a>
    </div>

  </div>

  <script src="config.js"></script>
  <script>
    const API = window.RX_API || 'https://roadmapx-backend-3qmc.onrender.com';

    function show(id) {
      ['state-loading','state-success','state-error'].forEach(s => {
        document.getElementById(s).style.display = s === id ? 'block' : 'none';
      });
    }

    (async function init() {
      const params = new URLSearchParams(window.location.search);

      // ── Case A: Backend redirect returned here after verifying token ──
      // URL: magic-link.html?magic=ok&user=USERNAME
      // URL: magic-link.html?magic=fail&msg=...  (from login.html redirect)
      if (params.has('magic')) {
        history.replaceState({}, '', window.location.pathname); // clean URL

        if (params.get('magic') === 'ok') {
          const username = params.get('user') || '';
          // Write localStorage so rest of app works immediately
          localStorage.setItem('rx_token', 'true');
          localStorage.setItem('rx_user', username);

          try {
            if (window.HybridData && typeof window.HybridData.onLoginSuccess === 'function') {
              await window.HybridData.onLoginSuccess(username);
            }
          } catch (e) { /* non-blocking */ }

          show('state-success');
          setTimeout(() => { window.location.replace('index.html'); }, 1200);

        } else {
          // fail — show error with message from backend
          const msg = params.get('msg') || 'This magic link is invalid or has expired.';
          document.getElementById('err-msg').textContent = decodeURIComponent(msg).replace(/\+/g, ' ');
          show('state-error');
        }
        return;
      }

      // ── Case B: User lands here directly from the email link ──
      // URL: magic-link.html?token=TOKEN&e=EMAIL
      // We call the backend verify endpoint ourselves (avoids a separate redirect page)
      const token = params.get('token');
      const email = params.get('e');

      if (!token || !email) {
        document.getElementById('err-msg').textContent = 'Missing link parameters. Please request a new magic link.';
        show('state-error');
        return;
      }

      try {
        // The backend GET /auth/email/verify redirects — but we can also
        // just navigate to it and let the redirect bring us back here with ?magic=ok
        window.location.href = `${API}/auth/email/verify?token=${encodeURIComponent(token)}&e=${encodeURIComponent(email)}`;
      } catch (err) {
        document.getElementById('err-msg').textContent = 'Could not reach the server. Please try again.';
        show('state-error');
      }
    })();
  </script>
</body>
</html>
