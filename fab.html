<!-- Floating Button -->
<div id="fab-btn" title="Quick Tools">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    <path d="M4.93 4.93a10 10 0 0 0 0 14.14"/>
  </svg>
</div>

<!-- Popup Panel -->
<div id="fab-panel">

  <!-- Tabs -->
  <div id="fab-tabs">
    <button class="fab-tab fab-tab-active" data-tab="pomo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Pomodoro
    </button>
    <button class="fab-tab" data-tab="notes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Notes
    </button>
  </div>

  <!-- Pomodoro Section -->
  <div id="fab-pomo" class="fab-section">
    <div id="fab-pomo-ring">
      <svg id="fab-pomo-svg" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="6"/>
        <circle id="fab-pomo-arc" cx="50" cy="50" r="42" fill="none" stroke="var(--c1,#00e5c8)"
          stroke-width="6" stroke-linecap="round"
          stroke-dasharray="264" stroke-dashoffset="0"
          transform="rotate(-90 50 50)"/>
      </svg>
      <div id="fab-pomo-center">
        <div id="fab-pomo-time">25:00</div>
        <div id="fab-pomo-mode">FOCUS</div>
      </div>
    </div>
    <div id="fab-pomo-controls">
      <button id="fab-pomo-start" class="fab-ctrl-btn fab-ctrl-green">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button id="fab-pomo-pause" class="fab-ctrl-btn" style="display:none">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button id="fab-pomo-reset" class="fab-ctrl-btn fab-ctrl-red">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.67"/></svg>
      </button>
    </div>
    <div id="fab-pomo-session">Session <span id="fab-pomo-count">1</span> of 4</div>
  </div>

  <!-- Notes Section -->
  <div id="fab-notes" class="fab-section" style="display:none">
    <textarea id="fab-notes-ta" placeholder="Quick notes…"></textarea>
    <div id="fab-notes-footer">
      <span id="fab-notes-wc">0 words</span>
      <button id="fab-notes-save">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save
      </button>
    </div>
  </div>

</div>
