# Codemagic CI/CD Configuration for RoadmapX Android
# ==================================================
# This workflow builds both debug APK and signed release AAB
# for deployment to the Google Play Store.
#
# REQUIRED ENVIRONMENT VARIABLES (set in Codemagic UI → Settings → Environment variables):
# ------------------------------------------------------------------------------------------
#   CM_KEYSTORE          — Base64-encoded .keystore file
#                          Generate: base64 -i roadmapx.keystore | pbcopy
#   CM_KEYSTORE_PASSWORD — Password for the keystore
#   CM_KEY_ALIAS         — Alias of the key inside the keystore (e.g. "roadmapx")
#   CM_KEY_PASSWORD      — Password for the specific key (often same as keystore password)
#
# OPTIONAL ENVIRONMENT VARIABLES:
# -------------------------------
#   GOOGLE_SERVICES_JSON — Base64-encoded google-services.json for Firebase/Push Notifications
#                          Generate: base64 -i google-services.json | pbcopy
#                          If not set, the build will skip Firebase integration and
#                          push notifications will not work.
#
# HOW TO SET ENVIRONMENT VARIABLES IN CODEMAGIC:
# -----------------------------------------------
#   1. Go to your app in Codemagic → Settings → Environment variables
#   2. Click "Add variable"
#   3. Enter the variable name (e.g. CM_KEYSTORE) and paste the value
#   4. Check "Secure" for sensitive values (passwords, keystores)
#   5. Click "Add"
#
# HOW TO SETUP google-services.json:
# -----------------------------------
#   1. Go to Firebase Console → Project Settings → Your Apps → Android
#   2. Register app with package name: com.roadmapx.app
#   3. Download google-services.json
#   4. Encode it: base64 -i google-services.json | pbcopy
#   5. Add as GOOGLE_SERVICES_JSON environment variable in Codemagic
#   6. The script below will decode and place it in the correct location
#
# HOW TO GENERATE A KEYSTORE FOR RELEASE SIGNING:
# ------------------------------------------------
#   keytool -genkey -v -keystore roadmapx.keystore -alias roadmapx \
#     -keyalg RSA -keysize 2048 -validity 10000 \
#     -storepass YOUR_STORE_PASSWORD -keypass YOUR_KEY_PASSWORD
#
#   Then encode it for Codemagic:
#   base64 -i roadmapx.keystore | pbcopy
#   (On Linux: base64 -w0 roadmapx.keystore)

workflows:
  android-release:
    name: RoadmapX Android Release
    max_build_duration: 30
    instance_type: mac_mini_m2

    # Trigger on push to main branch
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    # Environment variables available to all scripts
    environment:
      node: 20
      java: 17

      # These are set via Codemagic UI, listed here for documentation
      vars:
        CM_KEYSTORE:
          description: "Base64-encoded Android keystore file (set in Codemagic UI)"
        CM_KEYSTORE_PASSWORD:
          description: "Password for the keystore (set in Codemagic UI)"
        CM_KEY_ALIAS:
          description: "Key alias inside the keystore, e.g. roadmapx (set in Codemagic UI)"
        CM_KEY_PASSWORD:
          description: "Password for the key alias (set in Codemagic UI)"
        GOOGLE_SERVICES_JSON:
          description: "Base64-encoded google-services.json (optional, set in Codemagic UI)"

      groups:
        - roadmapx_signing  # Create this group in Codemagic UI and add the keystore vars

    # Scripts executed in order
    scripts:
      - name: Decode keystore
        script: |
          echo "$CM_KEYSTORE" | base64 --decode > android/app/roadmapx.keystore

      - name: Decode google-services.json (optional)
        script: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
            echo "google-services.json decoded and placed successfully"
          else
            echo "GOOGLE_SERVICES_JSON not set — skipping Firebase integration"
            echo "Push notifications will not work without this file"
          fi

      - name: Install npm dependencies
        script: npm install

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Set release signing config in build.gradle
        script: |
          # Inject signing config into android/app/build.gradle
          # This adds the signingConfigs and references it in the release buildType
          cd android/app

          # Check if signing config already exists
          if grep -q "signingConfigs" build.gradle; then
            echo "Signing config already present, skipping injection"
          else
            # Add signingConfigs block before the buildTypes block
            sed -i.bak '/buildTypes {/i\
          signingConfigs {\
              release {\
                  storeFile file("roadmapx.keystore")\
                  storePassword System.getenv("CM_KEYSTORE_PASSWORD")\
                  keyAlias System.getenv("CM_KEY_ALIAS")\
                  keyPassword System.getenv("CM_KEY_PASSWORD")\
              }\
          }\
          ' build.gradle

            # Add signingConfig reference to release buildType
            sed -i.bak2 's/minifyEnabled false/minifyEnabled false\n            signingConfig signingConfigs.release/' build.gradle

            rm -f build.gradle.bak build.gradle.bak2
            echo "Signing config injected into build.gradle"
          fi

      - name: Build Debug APK
        script: cd android && ./gradlew assembleDebug

      - name: Build Release AAB (signed)
        script: cd android && ./gradlew bundleRelease

    # Artifacts to collect after build
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
      - android/app/build/outputs/bundle/release/app-release.aab
      - android/app/build/outputs/logs/*.txt

    # Notification settings
    publishing:
      email:
        recipients:
          - user@example.com  # Replace with your email
        notify:
          success: true
          failure: true
