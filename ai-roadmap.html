<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>AI Visual Roadmap</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg0:#05050f;--bg1:#0a0a18;--bg2:#0c0c20;--bg3:#12122a;
    --t1:#f0f0ff;--t2:#8080a8;
    --c1:#10b981;--c2:#3b82f6;--c3:#a855f7;--c4:#f97316;--c5:#8080a8;
    --mono:'Courier New',monospace;
  }
  html,body{height:100%;background:var(--bg0);color:var(--t1);font-family:system-ui,sans-serif;overflow:hidden;}

  /* ── Layout ── */
  #app{display:flex;flex-direction:column;height:100%;overflow:hidden;}

  /* ── Header ── */
  #hdr{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;background:var(--bg0);
    border-bottom:1px solid var(--c1);
    box-shadow:0 4px 20px rgba(0,0,0,0.6);flex-shrink:0;
  }
  #hdr-back{
    display:flex;align-items:center;gap:6px;
    background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);
    border-radius:8px;color:var(--c1);font-size:12px;font-weight:600;
    padding:6px 12px;cursor:pointer;
  }
  #hdr-title{font-family:var(--mono);font-size:13px;font-weight:800;letter-spacing:2px;color:var(--c1);}
  #hdr-pill{
    background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);
    border-radius:999px;color:var(--c1);font-family:var(--mono);
    font-size:11px;font-weight:700;padding:4px 10px;white-space:nowrap;
  }

  /* ── Legend ── */
  #legend{
    display:flex;align-items:center;gap:12px;padding:8px 14px;
    background:var(--bg1);border-bottom:1px solid rgba(255,255,255,.05);
    overflow-x:auto;scrollbar-width:none;flex-shrink:0;
  }
  #legend::-webkit-scrollbar{display:none;}
  .leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2);white-space:nowrap;font-family:var(--mono);}
  .leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .leg-dot.green{background:var(--c1);}
  .leg-dot.blue{background:var(--c2);}
  .leg-dot.purple{background:var(--c3);}
  .leg-dot.orange{background:var(--c4);}

  /* ── Hint bar ── */
  #hint{
    text-align:center;padding:6px;font-size:10px;color:var(--t2);
    font-family:var(--mono);background:rgba(16,185,129,.04);
    border-bottom:1px solid rgba(16,185,129,.08);flex-shrink:0;letter-spacing:.5px;
  }

  /* ── Graph scroll area ── */
  #graph{
    flex:1;overflow-y:auto;overflow-x:hidden;
    padding:12px 14px 120px;-webkit-overflow-scrolling:touch;
  }

  /* ── Section label ── */
  .sec-label{
    display:flex;align-items:center;gap:6px;margin:18px 0 10px;
  }
  .sec-num{font-family:var(--mono);font-size:10px;font-weight:800;color:var(--c1);opacity:.6;}
  .sec-title{font-family:var(--mono);font-size:9px;font-weight:800;color:var(--t2);letter-spacing:1.5px;}
  .sec-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(128,128,168,.3),transparent);}
  .sec-prog{font-family:var(--mono);font-size:9px;color:var(--t2);}

  /* ── Section block ── */
  .sec-block{display:flex;flex-direction:column;align-items:center;}

  /* ── Trunk node ── */
  .trunk{
    position:relative;border-radius:10px;cursor:pointer;
    padding:12px 20px 14px;text-align:center;
    min-width:180px;max-width:280px;width:70%;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    transition:transform .12s,box-shadow .15s;
    -webkit-tap-highlight-color:transparent;user-select:none;
  }
  .trunk:active{transform:scale(.97);}
  .trunk-label{font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;}
  .trunk-time{font-family:var(--mono);font-size:9px;color:var(--t2);margin-top:2px;}

  /* ── Expand chevron button ── */
  .exp-btn{
    display:flex;align-items:center;justify-content:center;gap:6px;
    margin-top:8px;
  }
  .exp-dot{
    width:24px;height:24px;border-radius:50%;
    background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);
    display:flex;align-items:center;justify-content:center;
    transition:transform .25s,background .15s;cursor:pointer;
    font-size:12px;color:var(--c1);line-height:1;
  }
  .exp-dot.open{transform:rotate(180deg);background:rgba(16,185,129,.22);}
  .info-btn{
    width:22px;height:22px;border-radius:50%;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    color:var(--t2);font-size:11px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0;
  }

  /* ── Status badge ── */
  .status-badge{
    position:absolute;top:6px;right:6px;
    width:16px;height:16px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:9px;font-weight:800;pointer-events:none;
  }

  /* ── Children grid ── */
  .children-wrap{
    display:none;
    flex-direction:row;gap:10px;width:100%;
    margin-top:10px;justify-content:center;
    opacity:0;transform:translateY(-8px);
    transition:opacity .22s ease, transform .22s ease;
  }
  .children-wrap.open{
    opacity:1;transform:translateY(0);
  }

  .child-col{display:flex;flex-direction:column;gap:8px;flex:1;max-width:calc(50% - 5px);}
  .child-col.left{align-items:flex-end;}
  .child-col.right{align-items:flex-start;}

  /* ── Child node ── */
  .child{
    position:relative;border-radius:8px;cursor:pointer;
    padding:7px 12px;width:100%;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    transition:transform .12s,box-shadow .15s;
    -webkit-tap-highlight-color:transparent;user-select:none;
  }
  .child:active{transform:scale(.96);}
  .child-label{font-size:11px;font-weight:600;color:var(--t1);line-height:1.3;}
  .child-time{font-family:var(--mono);font-size:8px;color:var(--t2);margin-top:1px;}

  /* ── Connector ── */
  .connector{display:flex;justify-content:center;padding:4px 0;}
  .v-line{width:2px;height:28px;background:linear-gradient(180deg,var(--c1),rgba(16,185,129,.15));border-radius:2px;}

  /* ── Border colour classes ── */
  .border-green{border:2px solid #10b981;background:#051a10;}
  .border-green .trunk-label{color:#10b981;}
  .border-blue{border:2px solid #3b82f6;background:#05101a;}
  .border-blue .child-label{color:#93c5fd;}
  .border-purple{border:2px solid #a855f7;background:#0f0520;}
  .border-purple .child-label{color:#d8b4fe;}
  .border-orange{border:2px solid #f97316;background:#1a0f05;}
  .border-orange .child-label{color:#fdba74;}
  .border-dashed{border:2px dashed #8080a8;background:#0c0c20;}

  /* ── Progress states ── */
  .node-done{opacity:.72;}
  .node-done .status-badge{background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.5);color:#6ee7b7;}
  .node-progress{box-shadow:0 0 0 2px rgba(16,185,129,.3),0 0 12px rgba(16,185,129,.12)!important;}
  .node-skip{opacity:.4;filter:saturate(.3);}

  /* ── Bottom progress bar ── */
  #prog-bar-wrap{height:3px;background:rgba(255,255,255,.05);flex-shrink:0;}
  #prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--c1),#6366f1);width:0%;transition:width .4s ease;}

  /* ── Overlay + Sheet ── */
  #overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.75);
    backdrop-filter:blur(3px);z-index:200;
    display:none;
  }
  #overlay.show{display:block;}
  #sheet{
    position:fixed;bottom:0;left:0;right:0;z-index:210;
    background:var(--bg2);border-top:1px solid rgba(255,255,255,.08);
    border-radius:20px 20px 0 0;max-height:88vh;
    overflow-y:auto;transform:translateY(100%);
    transition:transform .32s cubic-bezier(.32,.72,0,1);
    padding-bottom:env(safe-area-inset-bottom,20px);
  }
  #sheet.open{transform:translateY(0);}
  #sheet::-webkit-scrollbar{width:3px;}
  #sheet::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}

  .sheet-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:14px auto 0;}
  .sheet-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 18px 4px;gap:12px;}
  .sheet-hdr-left{flex:1;min-width:0;}
  .sheet-close{
    width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.07);
    border:none;color:var(--t2);font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .diff-badge{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:800;
    letter-spacing:1px;padding:2px 8px;border-radius:999px;margin-bottom:6px;}
  .sheet-title{font-size:18px;font-weight:800;color:var(--t1);line-height:1.25;}
  .sheet-time{font-family:var(--mono);font-size:10px;color:var(--t2);margin-top:5px;}
  .sheet-body{padding:10px 18px 24px;}
  .sec-lbl{font-family:var(--mono);font-size:9px;font-weight:800;letter-spacing:1.5px;
    color:var(--c1);text-transform:uppercase;margin:16px 0 7px;}
  .sheet-why{font-size:13px;color:#a0a0c0;line-height:1.65;}
  .sheet-learn{list-style:none;display:flex;flex-direction:column;gap:6px;}
  .sheet-learn li{font-size:13px;color:#c0c0e0;padding-left:16px;position:relative;line-height:1.5;}
  .sheet-learn li::before{content:'▸';position:absolute;left:0;color:var(--c1);font-size:10px;top:2px;}
  .sheet-prereq{font-size:12px;color:var(--t2);background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:8px 11px;}
  .sheet-task{font-size:13px;color:#c0c0e0;background:rgba(16,185,129,.05);
    border:1px solid rgba(16,185,129,.15);border-radius:8px;padding:10px 12px;line-height:1.6;}
  .res-row{display:flex;gap:10px;margin-top:14px;}
  .res-btn{flex:1;padding:10px;border-radius:10px;font-size:12px;font-weight:700;
    cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:6px;}
  .res-yt{background:rgba(255,0,0,.12);border:1px solid rgba(255,0,0,.25);color:#ff4444;}
  .res-doc{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#3b82f6;}
  .status-row{display:flex;gap:8px;margin-top:14px;}
  .st-btn{flex:1;padding:11px 8px;border-radius:10px;font-size:11px;font-weight:700;
    cursor:pointer;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);
    color:var(--t2);text-align:center;transition:all .15s;}
  .st-btn.active-done{background:rgba(16,185,129,.15);border-color:var(--c1);color:var(--c1);}
  .st-btn.active-progress{background:rgba(99,102,241,.15);border-color:#6366f1;color:#6366f1;}
  .st-btn.active-skip{background:rgba(128,128,168,.15);border-color:var(--t2);color:var(--t2);}

  /* ── Toast ── */
  #toast{
    position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--c1);color:#fff;font-size:13px;font-weight:700;
    padding:8px 20px;border-radius:999px;z-index:300;opacity:0;
    pointer-events:none;transition:opacity .2s,transform .2s;white-space:nowrap;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ── Long press ripple ── */
  @keyframes ripple{
    0%{transform:scale(1);opacity:.5;}
    100%{transform:scale(1.08);opacity:0;}
  }
  .pressing::after{
    content:'';position:absolute;inset:0;border-radius:inherit;
    border:2px solid var(--c1);animation:ripple .4s ease forwards;pointer-events:none;
  }
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <button id="hdr-back" onclick="window.history.length > 1 ? history.back() : window.location.href='index.html'">← Back</button>
    <div id="hdr-title">AI ROADMAP</div>
    <div id="hdr-pill">0 / 0 done</div>
  </div>
  <div id="legend">
    <div class="leg-item"><div class="leg-dot green"></div>Foundation</div>
    <div class="leg-item"><div class="leg-dot blue"></div>Tools / Libs</div>
    <div class="leg-item"><div class="leg-dot purple"></div>Advanced</div>
    <div class="leg-item"><div class="leg-dot orange"></div>Specialisation</div>
  </div>
  <div id="hint">TAP main node → expand sub-topics &nbsp;|&nbsp; HOLD main node → view details &nbsp;|&nbsp; TAP sub-node → view details</div>
  <div id="prog-bar-wrap"><div id="prog-bar-fill"></div></div>
  <div id="graph"></div>
</div>

<!-- Overlay -->
<div id="overlay"></div>

<!-- Detail Sheet -->
<div id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hdr">
    <div class="sheet-hdr-left">
      <div class="diff-badge" id="s-diff"></div>
      <div class="sheet-title" id="s-title"></div>
      <div class="sheet-time" id="s-time"></div>
    </div>
    <button class="sheet-close" id="sheet-close">✕</button>
  </div>
  <div class="sheet-body">
    <div class="sec-lbl">Why This Matters</div>
    <div class="sheet-why" id="s-why"></div>
    <div class="sec-lbl">What You'll Learn</div>
    <ul class="sheet-learn" id="s-learn"></ul>
    <div class="sec-lbl">Prerequisites</div>
    <div class="sheet-prereq" id="s-prereq"></div>
    <div class="sec-lbl">Practice Task</div>
    <div class="sheet-task" id="s-task"></div>
    <div class="res-row">
      <button class="res-btn res-yt" id="s-yt">▶ YouTube</button>
      <button class="res-btn res-doc" id="s-doc">📄 Docs</button>
    </div>
    <div class="sec-lbl">Mark Status</div>
    <div class="status-row">
      <button class="st-btn" id="sb-done"     onclick="setStatus('done')">✓ Done</button>
      <button class="st-btn" id="sb-progress" onclick="setStatus('progress')">⟳ In Progress</button>
      <button class="st-btn" id="sb-skip"     onclick="setStatus('skip')">– Skip</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function() {
'use strict';

// ── State ──────────────────────────────────────────────────────
const LS_KEY = 'ai_visual_progress';
let progress  = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
let expanded  = {};
let activeNode = null;

const saveProgress = () => localStorage.setItem(LS_KEY, JSON.stringify(progress));

// ── Complete Node Data ──────────────────────────────────────────
const NODES = [

  // ─────────────────────────────────────────────
  // SECTION 1 — PYTHON FOUNDATIONS
  // ─────────────────────────────────────────────
  {
    id: 'python',
    label: 'Python',
    section: 1,
    sectionTitle: 'Python Foundations',
    isMain: true,
    parent: null,
    border: 'green',
    difficulty: 'BEGINNER',
    time: '3–4 weeks',
    whyMatters: 'Python is the undisputed lingua franca of AI and machine learning. Every major ML framework — PyTorch, TensorFlow, scikit-learn, Hugging Face — is Python-first. Without solid Python fundamentals, you will constantly battle the language instead of the problem. Employers hiring ML engineers and data scientists almost universally require Python as table stakes before any other skill is considered.',
    learn: [
      'Installing Python 3, setting up a virtual environment, and using pip',
      'Core data types: int, float, str, bool, list, dict, tuple, set',

      'Object-oriented Python: classes, __init__, methods, inheritance',
      'File I/O: reading and writing text, CSV, and JSON files',
      'Using third-party libraries with pip and requirements.txt'
    ],
    prerequisites: 'None — this is the very first stop',
    task: 'Build a CLI data processor: read a CSV of student scores, compute mean/median/std, write a summary report to a JSON file, and print a sorted leaderboard. Use only the Python standard library — no pandas yet.',

    border: 'blue',
    difficulty: 'BEGINNER',
    time: '2–3 days',
    whyMatters: 'A properly configured Python environment prevents the dependency hell that breaks most beginners. Virtual environments isolate project dependencies so NumPy 1.x for one project does not clash with NumPy 2.x for another. Python syntax — indentation, colons, f-strings — is unlike most languages, and understanding it early prevents bugs that can take hours to diagnose.',
    learn: [
      'Installing Python 3 via pyenv or the official installer',

      'PEP 8 style guide: indentation, naming conventions, line length',
      'Python REPL and Jupyter notebooks for interactive experimentation',

  {

    section: 11,
    sectionTitle: 'Working With LLMs',
    isMain: false,
    parent: 'working-with-llms',
    border: 'blue',
    difficulty: 'BEGINNER',
    time: '4–5 days',
    whyMatters: 'Engineers who treat LLMs as black boxes make predictable, avoidable mistakes: they do not understand why reducing temperature fixes hallucinations, why long contexts degrade recall, or why a model seems "lazy" with high repetition penalties. Understanding the mechanics — tokens, sampling, context windows — gives you precise control over model behaviour rather than trial-and-error tuning.',
    learn: [
      'Tokenisation: text is split into subword tokens before processing — "unbelievable" might become ["un", "believe", "able"] — and the model predicts the next token, not the next word. Use the Hugging Face tokenizer to inspect how your prompts are tokenised before sending them.',
      'Context window is the total number of tokens the model can process at once (input + output combined). Claude 3.5 Sonnet supports 200K tokens, but retrieval performance degrades in the middle of long contexts — a phenomenon called "lost in the middle" that affects RAG architectures.',
      'Temperature controls randomness in sampling: temperature=0 is deterministic (always pick the highest-probability token), temperature=1 samples from the full distribution, temperature>1 creates chaotic outputs. Use temperature=0 for tasks requiring consistency (data extraction, coding) and 0.7–1.0 for creative tasks.',
      'Top-K sampling restricts the candidate tokens to the K highest probability tokens before sampling — setting top_k=50 means only the 50 most likely next tokens are considered, preventing very low probability tokens from being selected.',
      'Top-P (nucleus sampling) selects the smallest set of tokens whose cumulative probability exceeds P — top_p=0.9 means tokens covering 90% of probability mass are candidates. Most APIs default to top_p=1.0, and tuning this is often more effective than temperature for certain tasks.',
      'Repetition penalties penalise tokens that have already appeared in the output, reducing loops and stuttering — presence_penalty in the OpenAI API adds a flat penalty per already-seen token, while frequency_penalty scales with how many times the token has appeared.',
      'Max tokens controls the maximum length of the model\'s output — setting this too low truncates responses mid-sentence, which is a common bug in production systems that only surfaces on long outputs.'
    ],
    prerequisites: 'LLM Common Terminology',
    task: 'Build a sampling parameter explorer: create a Python notebook that sends the same creative writing prompt to GPT-4o with 20 different temperature/top-p combinations, collects the outputs, and visualises how the parameter space affects output diversity (use a sentence embedding model to measure pairwise cosine distances between outputs). Include a findings writeup.',

    docsUrl: 'https://platform.openai.com/docs/guides/text-generation/how-to-use-sampling'
  },
  {
    id: 'prompt-engineering',
    label: 'Prompt Engineering',
    section: 11,
    sectionTitle: 'Working With LLMs',
    isMain: false,
    parent: 'working-with-llms',
    border: 'purple',
    difficulty: 'INTERMEDIATE',
    time: '1–2 weeks',
    whyMatters: 'Prompt engineering is the highest-leverage skill in AI application development. A well-engineered prompt can turn a mediocre model into a great one — and a poorly written prompt can make a frontier model look useless. Companies like Microsoft and Anthropic employ dedicated prompt engineers at senior engineering salaries. Mastering techniques like chain-of-thought, few-shot examples, and structured output formatting directly translates to better products.',
    learn: [
      'Zero-shot prompting sends the task description without examples and relies on the model\'s training — works for common tasks like "summarise this text" but fails on specialised formats or edge cases that require calibration.',
      'Few-shot prompting includes 3–10 input/output examples in the prompt before the actual task — this is the single most reliable technique for improving output quality and consistency, especially for classification, extraction, and structured formatting tasks.',
      'Chain-of-Thought (CoT) prompting instructs the model to show its reasoning step by step before giving the final answer — add "Think step by step" or "Let\'s reason through this:" and watch accuracy on math and logic tasks improve dramatically.',
      'ReAct (Reason + Act) prompting interleaves reasoning steps with tool calls — the model reasons about what to do, calls a tool, observes the result, reasons again, and repeats — this is the foundation of most agent architectures.',
      'System prompting sets the model\'s role, persona, constraints, and output format — a good system prompt is like an employee onboarding document: it specifies the job, the rules, and the expected output format before any task begins.',
      'Structured output with JSON mode: instruct the model to return a JSON object matching a specific schema using response_format={"type": "json_object"} in OpenAI or by specifying the schema in the system prompt for Claude — this is essential for programmatic processing of model outputs.',
      'Prompt caching: Anthropic\'s Claude supports cache_control headers that cache the prefix of a prompt (system prompt + static context) across requests, reducing latency by 80% and cost by 90% on the cached portion — critical for production systems with long, static system prompts.'
    ],

  {
    id: 'context-engineering',
    label: 'Context Engineering',
    section: 11,
    sectionTitle: 'Working With LLMs',
    isMain: false,
    parent: 'working-with-llms',
    border: 'purple',
    difficulty: 'INTERMEDIATE',
    time: '1 week',
    whyMatters: 'Context engineering is what separates engineers who build production LLM systems from those who build demos. The key insight is that the model can only work with what is in its context window — so the engineering challenge is deciding what to put there, when, and in what format. Anthropic engineers coined this term specifically to describe the discipline of managing context as a first-class engineering concern, and it is increasingly cited in senior AI engineering job descriptions.',
    learn: [
      'Context engineering vs prompt engineering: prompt engineering focuses on the instruction wording; context engineering is the broader system design of what information flows into the context window and how — including retrieval, memory, tool outputs, and conversation history.',
      'External memory systems: since LLMs are stateless, you must persist and retrieve memory externally — options include vector databases for semantic memory (Chroma, Pinecone), relational DBs for structured facts, and key-value stores for session state.',
      'RAG as context injection: retrieval-augmented generation is fundamentally a context engineering technique — you retrieve the most relevant documents at query time and inject them into the context, making the model\'s response grounded in your data rather than its training.',
      'Dynamic context filtering: not all retrieved context is useful — rank retrieved chunks by relevance score (cosine similarity > 0.7 as a baseline), deduplicate semantically similar chunks, and prioritise recency for time-sensitive information before building the final context.',
      'Context compaction: when conversation history grows long, summarise earlier turns using the model itself — "Summarise the key facts established in this conversation in 200 words" — and replace the full history with the summary to stay within token limits without losing critical context.',
      'Context isolation: in multi-tenant systems, never share context between users — build isolation at the retrieval layer by filtering vector DB queries by user_id, and at the prompt layer by structuring context with clear XML tags like <user_context> and <system_context>.',
      'The context window as a scratchpad: models can use the context for intermediate reasoning steps — explicitly structure the context to include a <scratchpad> section where the model can reason before giving its final answer, dramatically improving accuracy on complex tasks.'

// ── Border styles ──
const STYLES = {
  green: {border:'2px solid #10b981',bg:'#051a10',color:'#10b981'},
  blue:  {border:'2px solid #3b82f6',bg:'#05101a',color:'#3b82f6'},
  purple:{border:'2px solid #a855f7',bg:'#0f0520',color:'#a855f7'},
  orange:{border:'2px solid #f97316',bg:'#1a0f05',color:'#f97316'},
  dashed:{border:'2px dashed #8080a8',bg:'#0c0c20',color:'#8080a8'},
};

function render() {
  const graph = document.getElementById('graph');
  graph.innerHTML = '';

  // Group by section
  const sections = {};
  NODES.forEach(n => {
    if (!sections[n.section]) sections[n.section] = [];
    sections[n.section].push(n);
  });
  const secNums = Object.keys(sections).map(Number).sort((a,b) => a-b);

  secNums.forEach((sNum, idx) => {
    const nodes    = sections[sNum];
    const main     = nodes.find(n => n.isMain);
    const children = nodes.filter(n => !n.isMain);
    const title    = main?.sectionTitle || `Section ${sNum}`;

    // Section label
    const secDone = nodes.filter(n => progress[n.id]?.status === 'done').length;
    const lbl = el('div','sec-label');
    lbl.innerHTML = `
      <span class="sec-num">§${String(sNum).padStart(2,'0')}</span>
      <span class="sec-title">${title.toUpperCase()}</span>
      <span class="sec-line"></span>
      <span class="sec-prog">${secDone}/${nodes.length}</span>`;
    graph.appendChild(lbl);

    const block = el('div','sec-block');

    // Trunk
    if (main) {
      const st = STYLES[main.border] || STYLES.dashed;
      const trunk = el('div', `trunk border-${main.border}`);
      trunk.id = `node-${main.id}`;
      trunk.style.cssText = `background:${st.bg};border:${st.border};`;
      trunk.innerHTML = `
        <div class="status-badge" id="badge-${main.id}"></div>
        <span class="trunk-label" style="color:${st.color}">${main.label}</span>
        <span class="trunk-time">${main.time}</span>
        ${children.length ? `
          <div class="exp-btn">
            <div class="exp-dot" id="exp-${sNum}">▾</div>
            <div class="info-btn" id="info-${main.id}">ⓘ</div>
          </div>` : ''}`;
      bindTrunk(trunk, main, sNum, children.length > 0);
      block.appendChild(trunk);
    }

    // Children grid
    if (children.length) {
      const wrap = el('div','children-wrap');
      wrap.id = `children-${sNum}`;
      // starts hidden (no 'open' class)

      const left  = el('div','child-col left');
      const right = el('div','child-col right');

      children.forEach((child, i) => {
        const st  = STYLES[child.border] || STYLES.dashed;
        const div = el('div',`child border-${child.border}`);
        div.id = `node-${child.id}`;
        div.style.cssText = `background:${st.bg};border:${st.border};`;
        div.innerHTML = `
          <div class="status-badge" id="badge-${child.id}"></div>
          <span class="child-label">${child.label}</span>
          <span class="child-time">${child.time}</span>`;
        bindChild(div, child);
        (i % 2 === 0 ? left : right).appendChild(div);
      });

      wrap.appendChild(left);
      wrap.appendChild(right);
      block.appendChild(wrap);
    }

    graph.appendChild(block);

    if (idx < secNums.length - 1) {
      const conn = el('div','connector');
      conn.innerHTML = '<div class="v-line"></div>';
      graph.appendChild(conn);
    }
  });

  applyProgress();
}

// ── Bind trunk: TAP = expand/collapse, HOLD (500ms) = open sheet ────────
function bindTrunk(trunk, node, sNum, hasChildren) {
  if (!hasChildren) {
    // No children — tap or click opens sheet directly
    bindChild(trunk, node);
    return;
  }

  let pressTimer  = null;
  let longFired   = false;
  let moved       = false;
  let touchActive = false;
  let sx = 0, sy = 0;

  // ── Touch: hold = open sheet, tap = expand/collapse ──
  trunk.addEventListener('touchstart', (e) => {
    longFired   = false;
    moved       = false;
    touchActive = true;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    trunk.classList.add('pressing');
    pressTimer = setTimeout(() => {
      longFired = true;
      trunk.classList.remove('pressing');
      openSheet(node.id);
    }, 500);
  }, { passive: true });

  trunk.addEventListener('touchmove', (e) => {
    const dx = Math.abs(e.touches[0].clientX - sx);
    const dy = Math.abs(e.touches[0].clientY - sy);
    if (dx > 8 || dy > 8) {
      moved = true;
      clearTimeout(pressTimer);
      trunk.classList.remove('pressing');
    }
  }, { passive: true });

  trunk.addEventListener('touchend', (e) => {
    clearTimeout(pressTimer);
    trunk.classList.remove('pressing');
    if (!longFired && !moved) {
      e.preventDefault();
      toggleSection(sNum);
    }
    longFired = false;
    setTimeout(() => { touchActive = false; }, 400);
  }, { passive: false });

  // ── Desktop: click = expand/collapse, mousedown hold = open sheet ──
  trunk.addEventListener('mousedown', (e) => {
    if (touchActive) return;
    if (e.target.closest && e.target.closest('.info-btn')) return;
    pressTimer = setTimeout(() => {
      longFired = true;
      openSheet(node.id);
    }, 500);
  });

  trunk.addEventListener('mouseup', () => {
    clearTimeout(pressTimer);
  });

  trunk.addEventListener('mouseleave', () => {
    clearTimeout(pressTimer);
    longFired = false;
  });

  trunk.addEventListener('click', (e) => {
    if (touchActive) return;
    if (e.target.closest && e.target.closest('.info-btn')) return;
    if (longFired) { longFired = false; return; }
    toggleSection(sNum);
  });

  // ⓘ info button always opens sheet (both touch and click)
  const infoBtn = document.getElementById(`info-${node.id}`);
  if (infoBtn) {
    infoBtn.addEventListener('touchend', (e) => {
      e.stopPropagation();
      e.preventDefault();
      clearTimeout(pressTimer);
      longFired = false;
      trunk.classList.remove('pressing');
      openSheet(node.id);
    }, { passive: false });
    infoBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!touchActive) openSheet(node.id);
    });
  }
}

// ── Bind child: tap = open sheet ────────────────────────────────
function bindChild(nodeEl, node) {
  let moved = false;
  let touchFired = false;
  nodeEl.addEventListener('touchstart', () => { moved = false; touchFired = false; }, { passive: true });
  nodeEl.addEventListener('touchmove',  () => { moved = true; }, { passive: true });
  nodeEl.addEventListener('touchend', (e) => {
    if (moved) return;
    e.preventDefault();
    touchFired = true;
    openSheet(node.id);
  }, { passive: false });
  nodeEl.addEventListener('click', (e) => {
    e.stopPropagation();
    if (touchFired) { touchFired = false; return; }
    openSheet(node.id);
  });
}

// ── Toggle children ──────────────────────────────────────────────
function toggleSection(sNum) {
  expanded[sNum] = !expanded[sNum];
  const wrap = document.getElementById(`children-${sNum}`);
  const dot  = document.getElementById(`exp-${sNum}`);
  if (!wrap) return;
  if (expanded[sNum]) {
    wrap.style.display = 'flex';
    // Force reflow so animation triggers
    wrap.getBoundingClientRect();
    wrap.classList.add('open');
    if (dot) dot.classList.add('open');
  } else {
    wrap.classList.remove('open');
    if (dot) dot.classList.remove('open');
    // Hide after animation completes
    setTimeout(() => {
      if (!expanded[sNum]) wrap.style.display = 'none';
    }, 260);
  }
}

// ── Open detail sheet ────────────────────────────────────────────
function openSheet(nodeId) {
  const node = NODES.find(n => n.id === nodeId);
  if (!node) return;
  activeNode = nodeId;

  const DIFF_COLORS = {
    BEGINNER:    {bg:'rgba(16,185,129,.15)',color:'#10b981',bdr:'rgba(16,185,129,.3)'},
    INTERMEDIATE:{bg:'rgba(59,130,246,.15)',color:'#3b82f6',bdr:'rgba(59,130,246,.3)'},
    ADVANCED:    {bg:'rgba(168,85,247,.15)',color:'#a855f7',bdr:'rgba(168,85,247,.3)'},
    OPTIONAL:    {bg:'rgba(128,128,168,.15)',color:'#8080a8',bdr:'rgba(128,128,168,.3)'},
  };
  const dc = DIFF_COLORS[node.difficulty] || DIFF_COLORS.BEGINNER;

  document.getElementById('s-diff').textContent = node.difficulty;
  document.getElementById('s-diff').style.cssText =
    `background:${dc.bg};color:${dc.color};border:1px solid ${dc.bdr};
     padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;
     letter-spacing:.06em;display:inline-block;font-family:var(--mono);`;
  document.getElementById('s-title').textContent  = node.label;
  document.getElementById('s-time').textContent   = `⏱ ${node.time}`;
  document.getElementById('s-why').textContent    = node.whyMatters;
  document.getElementById('s-prereq').textContent = node.prerequisites || 'None';
  document.getElementById('s-task').textContent   = node.task;
  document.getElementById('s-learn').innerHTML    =
    (node.learn||[]).map(x=>`<li>${x}</li>`).join('');

  const ytBtn  = document.getElementById('s-yt');
  const docBtn = document.getElementById('s-doc');
  ytBtn.onclick  = () => window.open(`https://youtube.com/results?search_query=${encodeURIComponent(node.youtubeQuery||node.label+' tutorial')}`, '_blank');
  docBtn.onclick = () => window.open(node.docsUrl || 'https://google.com', '_blank');

  refreshStatusBtns(nodeId);

  document.getElementById('overlay').classList.add('show');
  document.getElementById('sheet').classList.add('open');
  document.getElementById('sheet').scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('open');
  document.body.style.overflow = '';
  activeNode = null;
}

// ── Status ───────────────────────────────────────────────────────
window.setStatus = function(status) {
  if (!activeNode) return;
  const cur = progress[activeNode]?.status;
  if (cur === status) {
    delete progress[activeNode];
  } else {
    progress[activeNode] = { status, doneAt: new Date().toISOString() };
  }
  saveProgress();
  applyProgress();
  refreshStatusBtns(activeNode);
  showToast(status === 'done' ? '✓ Marked complete!' : status === 'progress' ? '⟳ In Progress' : '– Skipped');
};

function refreshStatusBtns(nodeId) {
  const s = progress[nodeId]?.status;
  document.getElementById('sb-done').className     = 'st-btn' + (s==='done'?'     active-done':'');
  document.getElementById('sb-progress').className = 'st-btn' + (s==='progress'?' active-progress':'');
  document.getElementById('sb-skip').className     = 'st-btn' + (s==='skip'?'     active-skip':'');
}

// ── Apply progress visuals ───────────────────────────────────────
function applyProgress() {
  let done = 0;
  NODES.forEach(node => {
    const el  = document.getElementById(`node-${node.id}`);
    const bdg = document.getElementById(`badge-${node.id}`);
    if (!el) return;
    el.classList.remove('node-done','node-progress','node-skip');
    if (bdg) bdg.innerHTML = '';
    const p = progress[node.id];
    if (!p) return;
    if (p.status === 'done') {
      done++;
      el.classList.add('node-done');
      if (bdg) bdg.innerHTML = '✓';
      if (bdg) Object.assign(bdg.style, {background:'rgba(16,185,129,.2)',border:'1px solid rgba(16,185,129,.5)',color:'#6ee7b7',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'50%'});
    } else if (p.status === 'progress') {
      el.classList.add('node-progress');
    } else if (p.status === 'skip') {
      el.classList.add('node-skip');
    }
  });

  // Update pill and bar
  const pill = document.getElementById('hdr-pill');
  if (pill) pill.textContent = `${done} / ${NODES.length} done`;
  const bar = document.getElementById('prog-bar-fill');
  if (bar) bar.style.width = `${NODES.length ? (done/NODES.length*100) : 0}%`;

  // Update section labels
  document.querySelectorAll('.sec-prog').forEach(el => {
    // Re-compute per section
    const secNum = parseInt(el.closest('.sec-label')?.querySelector('.sec-num')?.textContent?.replace('§','')) || 0;
    if (!secNum) return;
    const secNodes = NODES.filter(n => n.section === secNum);
    const secDone  = secNodes.filter(n => progress[n.id]?.status === 'done').length;
    el.textContent = `${secDone}/${secNodes.length}`;
  });
}

// ── Toast ─────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 1800);
}

// ── Helpers ───────────────────────────────────────────────────────
function el(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

// ── Swipe sheet to dismiss ────────────────────────────────────────
(function() {
  const sheet = document.getElementById('sheet');
  let sy = 0, cy = 0, dragging = false, scrollTop = 0;
  sheet.addEventListener('touchstart', e => {
    scrollTop = sheet.scrollTop;
    sy = cy = e.touches[0].clientY;
    dragging = true;
  }, { passive: true });
  sheet.addEventListener('touchmove', e => {
    if (!dragging) return;
    cy = e.touches[0].clientY;
    const d = cy - sy;
    if (d > 0 && scrollTop <= 0) {
      sheet.style.transition = 'none';
      sheet.style.transform  = `translateY(${Math.min(d * 0.6, 180)}px)`;
    }
  }, { passive: true });
  sheet.addEventListener('touchend', () => {
    dragging = false;
    sheet.style.transition = '';
    if ((cy - sy) > 80 && scrollTop <= 0) {
      sheet.style.transform = '';
      closeSheet();
    } else {
      sheet.style.transform = '';
    }
  }, { passive: true });
})();

// Wire close button and overlay
document.getElementById('sheet-close').addEventListener('click', closeSheet);
document.getElementById('overlay').addEventListener('click', closeSheet);

// ── Boot ──────────────────────────────────────────────────────────
render();

})();
</script>
</body>
