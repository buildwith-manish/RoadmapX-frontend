<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoadmapX — Forgot Password</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Inherits look from login.html — minimal extra rules. */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#070711;--surface:rgba(10,10,26,0.88);--border:rgba(123,47,255,0.25);
      --cyan:#00f5d4;--purple:#7b2fff;--text:#c9d1e0;--text-dim:#5a6480;
      --radius:14px;--transition:0.22s cubic-bezier(0.4,0,0.2,1);
    }
    html,body{height:100%}
    body{
      background-color:var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%,rgba(123,47,255,0.18) 0%,transparent 70%),
        radial-gradient(ellipse 60% 40% at 90% 110%,rgba(0,245,212,0.10) 0%,transparent 60%);
      display:flex;align-items:center;justify-content:center;min-height:100vh;
      font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:var(--text);padding:24px;
    }
    .card{
      width:100%;max-width:420px;background:var(--surface);
      border:1px solid var(--border);border-radius:var(--radius);
      padding:40px;backdrop-filter:blur(20px);
      box-shadow:0 4px 24px rgba(0,0,0,0.6),0 0 80px rgba(123,47,255,0.08);
    }
    h1{
      font-size:1.5rem;font-weight:700;margin-bottom:6px;
      background:linear-gradient(90deg,var(--cyan),#a78bfa,var(--purple));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    p.lead{color:var(--text-dim);font-size:.85rem;margin-bottom:24px}
    label{
      font-size:.78rem;font-family:'Courier New',monospace;color:#a0aec8;
      letter-spacing:.08em;text-transform:uppercase;font-weight:600;
      display:block;margin-bottom:6px;
    }
    input{
      width:100%;padding:12px 14px;background:rgba(255,255,255,0.03);
      border:1px solid rgba(123,47,255,0.22);border-radius:8px;color:var(--text);
      font-size:.94rem;outline:none;
    }
    input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,245,212,.10)}
    .btn{
      width:100%;padding:13px;border:none;border-radius:9px;color:#fff;
      font-weight:600;cursor:pointer;margin-top:18px;
      background:linear-gradient(90deg,var(--cyan),var(--purple));
    }
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .msg{
      display:none;margin-top:16px;padding:10px 14px;border-radius:8px;
      font-size:.84rem;border:1px solid transparent;
    }
    .msg.visible{display:block}
    .msg.error{background:rgba(255,45,110,.08);border-color:rgba(255,45,110,.25);color:#ff6b8a}
    .msg.success{background:rgba(0,245,212,.08);border-color:rgba(0,245,212,.25);color:var(--cyan)}
    .back{display:block;margin-top:18px;font-size:.82rem;color:var(--text-dim);text-align:center;text-decoration:none}
    .back:hover{color:var(--cyan)}
  </style>
</head>
<body>
  <div class="card">
    <h1>Forgot password?</h1>
    <p class="lead">Enter your email and we'll send you a reset link.</p>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />

    <button class="btn" id="send-btn" type="button" onclick="sendReset()">Send reset link</button>

    <div class="msg" id="msg"></div>

    <a href="login.html" class="back">← Back to login</a>
  </div>

  <script src="config.js"></script>
  <script src="forgot_password_script.js" defer></script>
</body>
</html>
