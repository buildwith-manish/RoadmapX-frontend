<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoadmapX — Sessions & Devices</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root{
      --bg:#070711;--surface:rgba(10,10,26,0.88);--border:rgba(123,47,255,0.25);
      --cyan:#00f5d4;--purple:#7b2fff;--text:#c9d1e0;--text-dim:#5a6480;
      --danger:#ff6b8a;
    }
    html,body{min-height:100%}
    body{
      background-color:var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%,rgba(123,47,255,0.18),transparent 70%),
        radial-gradient(ellipse 60% 40% at 90% 110%,rgba(0,245,212,0.10),transparent 60%);
      font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
      color:var(--text);padding:40px 20px;
    }
    .wrap{max-width:780px;margin:0 auto}
    .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
    .top a{color:var(--cyan);text-decoration:none;font-size:.85rem;font-family:'Courier New',monospace}
    h1{
      font-size:1.6rem;font-weight:700;
      background:linear-gradient(90deg,var(--cyan),#a78bfa,var(--purple));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .sub{color:var(--text-dim);font-size:.88rem;margin-top:6px;line-height:1.5}
    .actions{margin:22px 0;display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      padding:9px 16px;border:1px solid var(--border);border-radius:8px;
      background:transparent;color:var(--text);font-size:.82rem;cursor:pointer;
      font-family:'Courier New',monospace;letter-spacing:.05em;
    }
    .btn:hover{border-color:var(--cyan);color:var(--cyan)}
    .btn.danger{color:var(--danger);border-color:rgba(255,107,138,.35)}
    .btn.danger:hover{background:rgba(255,107,138,.08)}
    .list{display:flex;flex-direction:column;gap:12px}
    .item{
      background:var(--surface);border:1px solid var(--border);
      border-radius:12px;padding:18px 20px;
      display:flex;justify-content:space-between;align-items:center;gap:16px;
      backdrop-filter:blur(12px);
    }
    .item.current{border-color:rgba(0,245,212,.5);box-shadow:0 0 30px rgba(0,245,212,.06)}
    .info .device{font-weight:600;font-size:.98rem;margin-bottom:4px}
    .info .meta{color:var(--text-dim);font-size:.78rem;font-family:'Courier New',monospace;line-height:1.5;word-break:break-all}
    .badge{
      display:inline-block;font-size:.65rem;padding:2px 8px;border-radius:99px;
      background:rgba(0,245,212,.15);color:var(--cyan);margin-left:8px;
      font-family:'Courier New',monospace;letter-spacing:.1em;
    }
    .empty,.loading{text-align:center;color:var(--text-dim);padding:60px 0}
    .toast{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      background:var(--surface);border:1px solid var(--border);border-radius:8px;
      padding:10px 18px;font-size:.85rem;opacity:0;pointer-events:none;
      transition:opacity .2s;
    }
    .toast.show{opacity:1}
    .toast.error{border-color:rgba(255,107,138,.45);color:var(--danger)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a href="index.html">&larr; Back to app</a>
      <a href="#" id="logout-link">Sign out</a>
    </div>

    <h1>Sessions &amp; Devices</h1>
    <p class="sub">
      These are the browsers and devices currently signed in to your RoadmapX account.
      Don't recognise one? Revoke it.
    </p>

    <div class="actions">
      <button class="btn" id="refresh-btn">Refresh</button>
      <button class="btn danger" id="revoke-others-btn">Sign out everywhere else</button>
    </div>

    <div id="list" class="list">
      <div class="loading">Loading sessions…</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="auth_guard.js" defer></script>
  <script src="config.js"></script>
  <script src="sessions_script.js" defer></script>
</body>
</html>
